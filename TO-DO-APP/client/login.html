<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List - Login</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div id="app">
    <div class="auth-container">
      <div class="auth-card">
        <h2 class="auth-title">To-Do List</h2>

        <!-- Login Form -->
        <div id="login-form-container" class="auth-form active">
          <h2>Login</h2>
          <form id="login-form">
            <div class="form-group">
              <label for="login-username">Username</label>
              <input
                type="text"
                id="login-username"
                placeholder="Enter your username"
                required
              />
            </div>

            <div class="form-group">
              <label for="login-password">Password</label>
              <input
                type="password"
                id="login-password"
                placeholder="Enter your password"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary auth-btn">Login</button>
          </form>

          <p class="auth-toggle">
            Don't have an account?
            <a href="#" onclick="toggleAuthForm(event)">Create one</a>
          </p>

          <div id="login-error" class="error-message" style="display: none;"></div>
        </div>

        <!-- Register Form -->
        <div id="register-form-container" class="auth-form">
          <h2>Create Account</h2>
          <form id="register-form">
            <div class="form-group">
              <label for="register-username">Username</label>
              <input
                type="text"
                id="register-username"
                placeholder="Choose a username"
                required
              />
            </div>

            <div class="form-group">
              <label for="register-email">Email</label>
              <input
                type="email"
                id="register-email"
                placeholder="Enter your email"
                required
              />
            </div>

            <div class="form-group">
              <label for="register-password">Password</label>
              <input
                type="password"
                id="register-password"
                placeholder="Create a password"
                required
              />
            </div>

            <div class="form-group">
              <label for="register-confirm-password">Confirm Password</label>
              <input
                type="password"
                id="register-confirm-password"
                placeholder="Confirm your password"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary auth-btn">Create Account</button>
          </form>

          <p class="auth-toggle">
            Already have an account?
            <a href="#" onclick="toggleAuthForm(event)">Login here</a>
          </p>

          <div id="register-error" class="error-message" style="display: none;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script defer src="assets/js/utils.js"></script>
  <script defer src="assets/js/auth.js"></script>
</body>
</html>
